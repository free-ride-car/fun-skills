name: Claude (Alibaba Cloud)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_PAYLOAD: ${{ toJson(github.event) }}
        run: |
          # 提取用户消息和上下文
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            MESSAGE='${{ github.event.comment.body }}'
            ISSUE_NUMBER='${{ github.event.issue.number }}'
            ISSUE_TITLE='${{ github.event.issue.title }}'
            ISSUE_BODY='${{ github.event.issue.body }}'
            REPO='${{ github.repository }}'
          elif [ "$EVENT_NAME" = "issues" ]; then
            MESSAGE='${{ github.event.issue.body }}'
            ISSUE_NUMBER='${{ github.event.issue.number }}'
            ISSUE_TITLE='${{ github.event.issue.title }}'
            ISSUE_BODY='${{ github.event.issue.body }}'
            REPO='${{ github.repository }}'
          elif [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            MESSAGE='${{ github.event.comment.body }}'
            ISSUE_NUMBER='${{ github.event.pull_request.number }}'
            ISSUE_TITLE='${{ github.event.pull_request.title }}'
            ISSUE_BODY='${{ github.event.pull_request.body }}'
            REPO='${{ github.repository }}'
          elif [ "$EVENT_NAME" = "pull_request_review" ]; then
            MESSAGE='${{ github.event.review.body }}'
            ISSUE_NUMBER='${{ github.event.pull_request.number }}'
            ISSUE_TITLE='${{ github.event.pull_request.title }}'
            ISSUE_BODY='${{ github.event.pull_request.body }}'
            REPO='${{ github.repository }}'
          fi

          # 移除 @claude 触发词
          CLEAN_MESSAGE=$(echo "$MESSAGE" | sed 's/@claude//gi' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

          echo "message=$CLEAN_MESSAGE" >> $GITHUB_OUTPUT
          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          echo "issue_title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
          echo "issue_body=$ISSUE_BODY" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "event_name=$EVENT_NAME" >> $GITHUB_OUTPUT

      - name: Call Alibaba Cloud GLM API
        id: llm
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          MESSAGE='${{ steps.context.outputs.message }}'
          ISSUE_TITLE='${{ steps.context.outputs.issue_title }}'
          ISSUE_BODY='${{ steps.context.outputs.issue_body }}'

          # 构建 prompt
          SYSTEM_PROMPT="你是一个有帮助的 AI 助手。用户会在 GitHub Issue 或 PR 中提及你来请求帮助。请用中文友好地回复用户的问题。"

          USER_PROMPT="GitHub Issue/PR 标题: $ISSUE_TITLE

          GitHub Issue/PR 内容:
          $ISSUE_BODY

          用户请求: $MESSAGE"

          # 调用百炼 API (OpenAI 兼容模式)
          RESPONSE=$(curl -s -X POST "https://coding.dashscope.aliyuncs.com/v1/chat/completions" \
            -H "Authorization: Bearer $DASHSCOPE_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"glm-5\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"$SYSTEM_PROMPT\"},
                {\"role\": \"user\", \"content\": \"$USER_PROMPT\"}
              ],
              \"max_tokens\": 2048
            }")

          # 提取回复内容
          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "抱歉，生成回复时出现错误。"')

          # 保存回复到文件（处理多行内容）
          echo "$CONTENT" > /tmp/response.txt

          echo "response_file=/tmp/response.txt" >> $GITHUB_OUTPUT

      - name: Post comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = fs.readFileSync('/tmp/response.txt', 'utf8');

            const issueNumber = '${{ steps.context.outputs.issue_number }}';
            const eventName = '${{ steps.context.outputs.event_name }}';

            // 添加签名
            const fullResponse = response + '\n\n---\n_Powered by Alibaba Cloud GLM-5_';

            // 发布评论
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(issueNumber),
              body: fullResponse
            });